# Full stack: Kafka + Postgres + Redis + alert pipeline + UI
#
#   cp .env.example .env   # required: DATABASE_URL / POSTGRES_*
#   docker compose up --build
#   docker compose --profile demo up --build
#   docker compose logs -f alert-pipeline

services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: alert-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Topics are created only by kafka-init — never auto-create from a typo
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks:
      - alert-net

  kafka-init:
    image: apache/kafka:3.8.1
    container_name: alert-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic logs \
          --partitions 3 \
          --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic logs-dlq \
          --partitions 1 \
          --replication-factor 1
        echo "topics 'logs' and 'logs-dlq' ready"
    networks:
      - alert-net
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: alert-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env (see .env.example)}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env (see .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env (see .env.example)}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    networks:
      - alert-net

  redis:
    image: redis:7-alpine
    container_name: alert-redis
    command: ["redis-server", "--save", "", "--appendonly", "no", "--stop-writes-on-bgsave-error", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - alert-net

  # Local echo sink — opt-in via DISPATCH_WEBHOOK_ENABLED=true
  webhook-debug:
    image: mendhak/http-https-echo:31
    container_name: alert-webhook-debug
    ports:
      - "8080:8080"
    networks:
      - alert-net

  alert-pipeline:
    build:
      context: .
      dockerfile: ${PIPELINE_DOCKERFILE:-Dockerfile.pipeline}
    image: ${PIPELINE_IMAGE:-alert-pipeline:local}
    container_name: alert-pipeline
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
    volumes:
      - ./config/alerts.yaml:/config/alerts.yaml:ro
    environment:
      ALERT_CONFIG_PATH: /config/alerts.yaml
      PIPELINE_RUNTIME: quix
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_INPUT_TOPIC: ${KAFKA_INPUT_TOPIC:-logs}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-logs-dlq}
      KAFKA_DLQ_ENABLED: ${KAFKA_DLQ_ENABLED:-true}
      KAFKA_AUTO_CREATE_TOPICS: "false"
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-alert-pipeline}
      KAFKA_AUTO_OFFSET_RESET: ${KAFKA_AUTO_OFFSET_RESET:-earliest}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env (see .env.example)}
      # Redis: UI cache invalidation only (not pipeline dedup)
      REDIS_URL: redis://redis:6379/0
      # Dedup runs in Quix keyed state (group_by fingerprint)
      DEDUP_BACKEND: ${DEDUP_BACKEND:-quix}
      DEDUP_WINDOW_SECONDS: ${DEDUP_WINDOW_SECONDS:-300}
      DEDUP_UPDATE_INTERVAL_SECONDS: ${DEDUP_UPDATE_INTERVAL_SECONDS:-60}
      ALERT_MIN_LEVEL: ${ALERT_MIN_LEVEL:-ERROR}
      DISPATCH_ENABLED: ${DISPATCH_ENABLED:-true}
      # Emit path enqueues only; alert-dispatch-worker performs HTTP
      DISPATCH_MODE: ${DISPATCH_MODE:-outbox}
      DISPATCH_ZENDUTY_ENABLED: ${DISPATCH_ZENDUTY_ENABLED:-false}
      ZENDUTY_INTEGRATION_KEY: ${ZENDUTY_INTEGRATION_KEY:-}
      ZENDUTY_API_URL: ${ZENDUTY_API_URL:-https://www.zenduty.com/api/events}
      DISPATCH_TEAMS_ENABLED: ${DISPATCH_TEAMS_ENABLED:-false}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      # Opt-in: default false so compose does not surprise-fire webhooks
      DISPATCH_WEBHOOK_ENABLED: ${DISPATCH_WEBHOOK_ENABLED:-false}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://webhook-debug:8080/alerts}
      WEBHOOK_HEADERS_JSON: ${WEBHOOK_HEADERS_JSON:-{"Content-Type":"application/json"}}
      UI_CACHE_INVALIDATE_ON_WRITE: "true"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WAIT_FOR_KAFKA: "1"
      WAIT_FOR_POSTGRES: "1"
      RUN_MIGRATIONS: "1"
    restart: unless-stopped
    networks:
      - alert-net

  # Async notification worker — drains dispatch_outbox (Zenduty/Teams/webhook)
  alert-dispatch-worker:
    build:
      context: .
      dockerfile: ${PIPELINE_DOCKERFILE:-Dockerfile.pipeline}
    image: ${PIPELINE_IMAGE:-alert-pipeline:local}
    container_name: alert-dispatch-worker
    depends_on:
      postgres:
        condition: service_healthy
      alert-pipeline:
        condition: service_started
    env_file:
      - path: .env
        required: true
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env (see .env.example)}
      DISPATCH_ENABLED: ${DISPATCH_ENABLED:-true}
      DISPATCH_MODE: outbox
      DISPATCH_OUTBOX_POLL_SECONDS: ${DISPATCH_OUTBOX_POLL_SECONDS:-1}
      DISPATCH_OUTBOX_BATCH_SIZE: ${DISPATCH_OUTBOX_BATCH_SIZE:-50}
      DISPATCH_OUTBOX_MAX_ATTEMPTS: ${DISPATCH_OUTBOX_MAX_ATTEMPTS:-8}
      DISPATCH_ZENDUTY_ENABLED: ${DISPATCH_ZENDUTY_ENABLED:-false}
      ZENDUTY_INTEGRATION_KEY: ${ZENDUTY_INTEGRATION_KEY:-}
      ZENDUTY_API_URL: ${ZENDUTY_API_URL:-https://www.zenduty.com/api/events}
      DISPATCH_TEAMS_ENABLED: ${DISPATCH_TEAMS_ENABLED:-false}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      DISPATCH_WEBHOOK_ENABLED: ${DISPATCH_WEBHOOK_ENABLED:-false}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://webhook-debug:8080/alerts}
      WEBHOOK_HEADERS_JSON: ${WEBHOOK_HEADERS_JSON:-{"Content-Type":"application/json"}}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WAIT_FOR_KAFKA: "0"
      WAIT_FOR_POSTGRES: "1"
      RUN_MIGRATIONS: "1"
    command: ["alert-dispatch-worker"]
    restart: unless-stopped
    networks:
      - alert-net

  log-producer:
    profiles: ["demo"]
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    image: alert-pipeline:local
    container_name: alert-log-producer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      alert-pipeline:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_INPUT_TOPIC: ${KAFKA_INPUT_TOPIC:-logs}
      WAIT_FOR_KAFKA: "1"
      WAIT_FOR_POSTGRES: "0"
      RUN_MIGRATIONS: "0"
      # Dummy URL so entrypoint does not require DB for the producer
      DATABASE_URL: sqlite+pysqlite:////tmp/producer.db
    command: ["log-producer"]
    restart: unless-stopped
    networks:
      - alert-net

  alert-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    image: alert-ui:local
    container_name: alert-ui
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
    volumes:
      - ./config/alerts.yaml:/config/alerts.yaml:ro
    environment:
      ALERT_CONFIG_PATH: /config/alerts.yaml
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env (see .env.example)}
      REDIS_URL: redis://redis:6379/0
      UI_CACHE_TTL_SECONDS: ${UI_CACHE_TTL_SECONDS:-10}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_INPUT_TOPIC: ${KAFKA_INPUT_TOPIC:-logs}
      UI_PORT: "8000"
      WAIT_FOR_KAFKA: "1"
      WAIT_FOR_POSTGRES: "1"
      RUN_MIGRATIONS: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["alert-ui"]
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - alert-net

networks:
  alert-net:
    driver: bridge

volumes:
  pgdata:
