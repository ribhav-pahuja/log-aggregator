# Full stack: Kafka + Postgres + alert pipeline (+ optional sample producer & webhook sink)
#
#   docker compose up --build
#   docker compose --profile demo up --build   # also runs log-producer
#   docker compose logs -f alert-pipeline

services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: alert-kafka
    ports:
      # Host clients (local producer/tests): localhost:9092
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Dual listeners: PLAINTEXT for host, PLAINTEXT_INTERNAL for Docker network
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks:
      - alert-net

  kafka-init:
    image: apache/kafka:3.8.1
    container_name: alert-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic logs \
          --partitions 3 \
          --replication-factor 1
        echo "topic 'logs' ready"
    networks:
      - alert-net
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: alert-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: alerts
      POSTGRES_PASSWORD: alerts
      POSTGRES_DB: alerts
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alerts -d alerts"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    networks:
      - alert-net

  # Mock HTTP sink — enable DISPATCH_WEBHOOK_ENABLED on the app to inspect payloads

  redis:
    image: redis:7-alpine
    container_name: alert-redis
    # Avoid MISCONF stop-writes when RDB can't flush on constrained Docker volumes
    command: ["redis-server", "--save", "", "--appendonly", "no", "--stop-writes-on-bgsave-error", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - alert-net

  webhook-debug:
    image: mendhak/http-https-echo:31
    container_name: alert-webhook-debug
    ports:
      - "8080:8080"
    networks:
      - alert-net

  alert-pipeline:
    build:
      context: .
      dockerfile: ${PIPELINE_DOCKERFILE:-Dockerfile}
    image: ${PIPELINE_IMAGE:-alert-pipeline:local}
    container_name: alert-pipeline
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    volumes:
      - ./config/alerts.yaml:/config/alerts.yaml:ro
    environment:
      ALERT_CONFIG_PATH: /config/alerts.yaml
      PIPELINE_RUNTIME: ${PIPELINE_RUNTIME:-quix}
      FLINK_PARALLELISM: ${FLINK_PARALLELISM:-1}
      FLINK_PRINT_RESULTS: ${FLINK_PRINT_RESULTS:-false}
      FLINK_KAFKA_CONNECTOR_JAR: /opt/flink/lib/flink-sql-connector-kafka-3.2.0-1.19.jar
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_INPUT_TOPIC: logs
      KAFKA_CONSUMER_GROUP: alert-pipeline
      KAFKA_AUTO_OFFSET_RESET: earliest
      DATABASE_URL: postgresql+psycopg://alerts:alerts@postgres:5432/alerts
      DEDUP_WINDOW_SECONDS: ${DEDUP_WINDOW_SECONDS:-300}
      DEDUP_UPDATE_INTERVAL_SECONDS: ${DEDUP_UPDATE_INTERVAL_SECONDS:-60}
      ALERT_MIN_LEVEL: ${ALERT_MIN_LEVEL:-ERROR}
      DISPATCH_ENABLED: ${DISPATCH_ENABLED:-true}
      DISPATCH_ZENDUTY_ENABLED: ${DISPATCH_ZENDUTY_ENABLED:-false}
      ZENDUTY_INTEGRATION_KEY: ${ZENDUTY_INTEGRATION_KEY:-}
      ZENDUTY_API_URL: ${ZENDUTY_API_URL:-https://www.zenduty.com/api/events}
      DISPATCH_TEAMS_ENABLED: ${DISPATCH_TEAMS_ENABLED:-false}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      # Default: send to in-compose echo server so you can see dispatches without real APIs
      DISPATCH_WEBHOOK_ENABLED: ${DISPATCH_WEBHOOK_ENABLED:-true}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://webhook-debug:8080/alerts}
      WEBHOOK_HEADERS_JSON: ${WEBHOOK_HEADERS_JSON:-{"Content-Type":"application/json"}}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WAIT_FOR_KAFKA: "1"
      WAIT_FOR_POSTGRES: "1"
    restart: unless-stopped
    networks:
      - alert-net

  # Synthetic log traffic — opt-in: docker compose --profile demo up
  log-producer:
    profiles: ["demo"]
    build:
      context: .
      dockerfile: Dockerfile
    image: alert-pipeline:local
    container_name: alert-log-producer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      alert-pipeline:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_INPUT_TOPIC: logs
      WAIT_FOR_KAFKA: "1"
      WAIT_FOR_POSTGRES: "0"
    command: ["log-producer"]
    restart: unless-stopped
    networks:
      - alert-net


  alert-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: alert-pipeline:local
    container_name: alert-ui
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    volumes:
      - ./config/alerts.yaml:/config/alerts.yaml:ro
    environment:
      ALERT_CONFIG_PATH: /config/alerts.yaml
      DATABASE_URL: postgresql+psycopg://alerts:alerts@postgres:5432/alerts
      REDIS_URL: redis://redis:6379/0
      UI_CACHE_TTL_SECONDS: "10"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_INPUT_TOPIC: logs
      UI_PORT: "8000"
      WAIT_FOR_KAFKA: "1"
      WAIT_FOR_POSTGRES: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["alert-ui"]
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - alert-net



networks:
  alert-net:
    driver: bridge

volumes:
  pgdata:
